name: Build & push ttsim-qemu lab image

on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/Dockerfile'
      - '.github/workflows/build.yml'
      - 'ttlab'
      - 'tt-guest'
      - 'tt-sim'
      - 'entrypoint.sh'
      - 'labs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          # Build context is the repo root, not .devcontainer/, because the
          # Dockerfile does `COPY labs/ /labs/` and `COPY ttlab /usr/local/bin/`
          # and those live at the repo root.
          context: .
          file:    .devcontainer/Dockerfile
          push:    true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tt-sim-lab:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
